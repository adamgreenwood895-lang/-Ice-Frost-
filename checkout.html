<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROST | PROCESSING</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark">
    <div class="flow-box">
        <div id="step1" class="flow-step active">
            <img id="conf-img" src="" class="preview-img">
            <h2 id="conf-name">ITEM</h2>
            <p id="conf-price" class="blue-price">£0.00</p>
            <button class="ice-btn" onclick="showStep(2)">CONFIRM ORDER</button>
        </div>

        <div id="step2" class="flow-step">
            <h2>SECURE PAYMENT</h2>
            <div class="glass-card">ENC_ID: •••• •••• •••• 4242</div>
            <button class="ice-btn" onclick="startTracking()">AUTHORIZE</button>
        </div>

        <div id="step3" class="flow-step">
            <h2 class="shimmer">MANIFESTED</h2>
            <div class="progress-bar"><div id="fill" class="fill"></div></div>
            <p id="status">Syncing Logistics...</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const p = JSON.parse(localStorage.getItem("selectedProduct"));
        if(p){
            document.getElementById("conf-img").src = p.image;
            document.getElementById("conf-name").innerText = p.name;
            document.getElementById("conf-price").innerText = p.price;
        }
        function showStep(n){
            document.querySelectorAll('.flow-step').forEach(s => s.classList.remove('active'));
            document.getElementById('step'+n).classList.add('active');
        }
    </script>
</body>
</html>
