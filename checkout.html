<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FROST | PROCESSING</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark">
    <div class="flow-container">
        <!-- STEP 1: REVIEW -->
        <div id="step1" class="flow-step active">
            <div class="img-frame">
                <img id="itemImg" src="" alt="Product">
            </div>
            <h2 id="itemName">ITEM_ID</h2>
            <p id="itemPrice" class="blue-accent">£0.00</p>
            <button class="frost-btn" onclick="nextFlow(2)">INITIATE SECURE BUY</button>
        </div>

        <!-- STEP 2: PAYMENT -->
        <div id="step2" class="flow-step">
            <h2 class="shimmer">ENCRYPTED_PAY</h2>
            <div class="pay-card">
                <p>CREDIT_AUTH: •••• 4242</p>
            </div>
            <button class="frost-btn" onclick="startTracking()">AUTHORIZE</button>
        </div>

        <!-- STEP 3: TRACKING -->
        <div id="step3" class="flow-step">
            <h1 class="shimmer">MANIFESTED</h1>
            <div class="track-line"><div id="trackFill" class="track-fill"></div></div>
            <p id="trackStatus" class="status-label">SYNCING...</p>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const item = JSON.parse(localStorage.getItem("frost_selected"));
        if(item) {
            document.getElementById("itemImg").src = item.image;
            document.getElementById("itemName").innerText = item.name;
            document.getElementById("itemPrice").innerText = item.price;
        }
    </script>
</body>
</html>
